name: Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump (patch | minor | major) or explicit version (e.g. 2.0.0)"
        required: true
        default: patch
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # push version commit + tag
      id-token: write   # npm provenance attestation
      packages: write   # publish to GitHub Packages

    steps:
      - uses: actions/checkout@v6
        with:
          # Use a PAT if branch protection requires it, otherwise GITHUB_TOKEN is fine
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: pnpm
          registry-url: "https://npm.pkg.github.com"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # npm version accepts both bump types (patch/minor/major) and explicit versions (1.2.3)
      - name: Bump version
        id: version
        run: |
          NEW_VERSION=$(npm version "${{ inputs.version }}" --no-git-tag-version)
          echo "tag=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: pnpm run build

      - name: Commit & push tag
        run: |
          git add package.json
          git commit -m "chore: release ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD --follow-tags

      - name: Publish to GitHub Packages
        run: pnpm publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
